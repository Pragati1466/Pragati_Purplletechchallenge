version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: store-intel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: storeuser
      POSTGRES_PASSWORD: storepass
      POSTGRES_DB: store_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storeuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: store-intel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: store-intel-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://storeuser:storepass@db:5432/store_intelligence
      REDIS_URL: redis://redis:6379
      API_PORT: "8000"
      LOG_LEVEL: INFO
      ENABLE_CORS: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./dashboard:/app/dashboard
      - ./data:/app/data
      - ./output:/app/output
    # Production: no --reload flag (use Dockerfile CMD)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Data seeder (runs once on first startup, then exits) ────────────────────
  # Seeds real Brigade Road POS + visitor data so the API has live metrics
  # immediately — no need to wait for the full CCTV pipeline to run.
  seeder:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: store-intel-seeder
    restart: "no"
    environment:
      DATABASE_URL: postgresql+asyncpg://storeuser:storepass@db:5432/store_intelligence
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    command: >
      sh -c "
        echo 'Seeding real Brigade Road data...' &&
        python data/init_real_data.py &&
        echo 'Seeding complete.'
      "

volumes:
  postgres_data:

networks:
  default:
    name: store-intelligence-network
